<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebraic Reduction Evaluator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="glow-orb"></div>
            <h1>Algebraic Reduction Evaluator</h1>
            <p>Mathematical proof evaluation engine for full words under the reduction relation.</p>
        </header>

        <section class="input-card glass-panel">
            <div class="inputs">
                <div class="input-group">
                    <label for="alpha1">\(\alpha_1\)</label>
                    <input type="text" id="alpha1" value="010" placeholder="e.g. 010" tabindex="1">
                </div>
                <div class="input-group">
                    <label for="alpha2">\(\alpha_2\)</label>
                    <input type="text" id="alpha2" value="101" placeholder="e.g. 101" tabindex="2">
                </div>
            </div>
            <div class="actions">
                <button id="btn-random" class="btn btn-secondary">Evaluate Random Incomparable Pair</button>
                <button id="btn-process" class="btn btn-primary" tabindex="3">Evaluate</button>
            </div>
            <div id="error-msg" class="error-msg"></div>
        </section>

        <section id="results" class="results-container hidden">
            <div class="result-card glass-panel">
                <h2>Generated Sets</h2>
                <div class="math-content" id="sentence-E-x"></div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
