                            <i class="ph-bold ph-caret-right text-indigo-300"></i>
                        </div>
                        <p class="text-slate-500 text-xs mt-1 line-clamp-2 leading-relaxed">${text}</p>
                    </div>
                `;
            }
            ploSidebarContent.innerHTML = html;
        }

        function renderMainContent() {
            const course = COURSES_DATA.find(c => c.id === selectedCourseId);
            if (!course) return;

            // --- ส่วนประมวลผลหาระดับ Taxonomy สูงสุด ---
            let maxPloLevels = {
                'PLO 1': null, 'PLO 2': null, 'PLO 3': null, 
                'PLO 4': null, 'PLO 5': null, 'PLO 6': null, 'PLO 7': null
            };

            course.clos.forEach(clo => {
                clo.plos.forEach(ploStr => {
                    // หาคำว่า PLO ตามด้วยตัวเลข เช่น "PLO 1"
                    let ploMatch = ploStr.match(/(PLO\s*\d+)/i);
                    if (!ploMatch) return;
                    let ploKey = ploMatch[1].toUpperCase().replace(/\s+/g, ' ');

                    // หาคำภาษาอังกฤษในวงเล็บ
                    let taxMatch = ploStr.match(/\(([^)]+)\)/);
                    if (taxMatch) {
                        // ตัดช่องว่าง ปรับตัวพิมพ์ใหญ่ และเอาเฉพาะตัวอักษร
                        let engWord = taxMatch[1].trim().toUpperCase().replace(/[^A-Z ]/g, '');
                        let taxObj = TAXONOMY_RANK[engWord];
                        
                        if (taxObj) {
                            // ถ้าระดับปัจจุบันยังเป็น null หรือ ตัวใหม่มี rank สูงกว่า ให้เขียนทับ
                            if (!maxPloLevels[ploKey] || taxObj.rank > maxPloLevels[ploKey].rank) {
                                maxPloLevels[ploKey] = taxObj;
                            }
                        }
                    }
                });
            });
            // ------------------------------------

            const creditsMain = course.credits.split('(')[0];
            const creditsDetail = course.credits.includes('(') ? course.credits.substring(course.credits.indexOf('(')) : '';
            
            let prerequisiteHtml = course.prerequisite !== "-" 
                ? `<span class="text-rose-700 font-bold bg-rose-50 px-3 py-1 rounded-md border border-rose-200 text-sm md:text-base">${course.prerequisite}</span>`
                : `<span class="text-slate-500 font-medium text-sm md:text-base">ไม่มี</span>`;

            let selectOptionsHtml = COURSES_DATA.map(c => 
                `<option value="${c.id}" ${c.id === selectedCourseId ? 'selected' : ''}>${c.code} - ${c.nameTH}</option>`
            ).join('');

            let closHtml = course.clos.map((clo, index) => {
                let plosBadges = clo.plos.map(ploText => {
                    const isAffective = ploText.includes('เห็นคุณค่า') || ploText.includes('ตอบสนอง');
                    const badgeBg = isAffective ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-blue-100 text-blue-800 border-blue-300';
                    return `<span class="inline-flex items-center px-2 py-1 rounded-md text-[10px] md:text-xs font-black border ${badgeBg} mr-1 mb-1">${ploText}</span>`;
                }).join('');

                return `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-200">
                        <td data-label="ลำดับ" class="px-5 py-5 font-black text-slate-400 text-center align-top text-xl">${index + 1}</td>
                        <td data-label="ผลลัพธ์การเรียนรู้ (CLO)" class="px-5 py-5 text-slate-800 align-top leading-relaxed text-base md:text-lg font-medium">${clo.text}</td>
                        <td data-label="PLOs ที่สอดคล้อง" class="px-5 py-5 align-top">${plosBadges}</td>
                        <td data-label="การประเมิน" class="px-5 py-5 align-top">
                            <div class="text-xs font-bold text-indigo-600 uppercase tracking-tighter">Method: ${clo.assessmentMethod}</div>
                            <div class="text-sm text-slate-600 mt-1">${clo.assessmentTool}</div>
                        </td>
                    </tr>
                `;
            }).join('');

            mainContent.innerHTML = `
                <div class="max-w-6xl mx-auto space-y-6 pb-12">
                    <!-- Dropdown -->
                    <div class="relative max-w-xl">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1 block">เลือกรายวิชา</label>
                        <select onchange="selectCourse(this.value)" class="bg-white border border-slate-300 text-slate-800 text-base font-bold rounded-xl focus:ring-2 focus:ring-indigo-500 block w-full p-3 appearance-none shadow-sm cursor-pointer">
                            ${selectOptionsHtml}
                        </select>
                    </div>

                    <!-- Course Title -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-8">
                        <div class="flex flex-col md:flex-row justify-between gap-4">
                            <div>
                                <span class="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 rounded text-xs font-black tracking-widest font-mono mb-2 border border-indigo-200 uppercase">${course.code}</span>
                                <h2 class="text-xl md:text-3xl font-black text-slate-800 mb-1">${course.nameTH}</h2>
                                <h3 class="text-sm md:text-lg text-slate-500 font-serif italic">${course.nameEN}</h3>
                            </div>
                            <div class="flex items-center space-x-3 bg-slate-50 p-3 rounded-xl border border-slate-100 self-start md:self-auto">
                                <div class="text-3xl md:text-4xl font-black text-indigo-900">${creditsMain}</div>
                                <div class="text-[10px] md:text-xs font-bold text-slate-400 uppercase leading-none">Credits<br><span class="text-slate-500">${creditsDetail}</span></div>
                            </div>
                        </div>
                        <div class="mt-6 pt-4 border-t border-slate-100 text-sm md:text-base">
                            <span class="font-bold text-slate-700 mr-2">วิชาบังคับก่อน:</span> ${prerequisiteHtml}
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 md:p-6 space-y-4">
                            <div>
                                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center"><i class="ph-bold ph-translate mr-1"></i> ภาษาไทย</h4>
                                <p class="text-slate-700 leading-relaxed text-sm md:text-base">${course.descriptionTH}</p>
                            </div>
                            <div class="pt-4 border-t border-slate-50">
                                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center"><i class="ph-bold ph-translate mr-1"></i> English</h4>
                                <p class="text-slate-500 leading-relaxed text-sm md:text-base italic">${course.descriptionEN}</p>
                            </div>
                        </div>
                    </div>

                    <!-- CLO Table -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-indigo-600 px-6 py-4 text-white">
                            <h4 class="font-black text-lg flex items-center"><i class="ph-fill ph-target mr-2"></i> ผลลัพธ์การเรียนรู้ระดับรายวิชา (CLOs)</h4>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left responsive-table">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="px-5 py-4 font-bold text-slate-500 text-xs uppercase w-16 text-center">No.</th>
                                        <th class="px-5 py-4 font-bold text-slate-500 text-xs uppercase">CLO Description</th>
                                        <th class="px-5 py-4 font-bold text-slate-500 text-xs uppercase w-48">Mapped PLOs</th>
                                        <th class="px-5 py-4 font-bold text-slate-500 text-xs uppercase w-64">Assessment</th>
                                    </tr>
                                </thead>
                                <tbody>${closHtml}</tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Taxonomy Summary Table (ตารางระดับพิสัยสูงสุด 2 แถว 8 หลัก) -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-slate-800 px-6 py-4 text-white">
                            <h4 class="font-black text-lg flex items-center"><i class="ph-fill ph-chart-bar mr-2"></i> ระดับความสามารถสูงสุดที่รายวิชาตอบสนอง (Highest Taxonomy Level)</h4>
                        </div>
                        <div class="overflow-x-auto p-4 md:p-6">
                            <table class="w-full text-center border-collapse border border-slate-300 min-w-[600px]">
                                <thead class="bg-slate-100">
                                    <tr>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-slate-600 w-32">ระดับพิสัย</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 1</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 2</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 3</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 4</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 5</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 6</th>
                                        <th class="border border-slate-300 px-4 py-3 font-black text-indigo-700">PLO 7</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="border border-slate-300 px-4 py-3 font-bold text-slate-700 bg-slate-50">ระดับสูงสุด</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 1'] ? maxPloLevels['PLO 1'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 2'] ? maxPloLevels['PLO 2'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 3'] ? maxPloLevels['PLO 3'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 4'] ? maxPloLevels['PLO 4'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 5'] ? maxPloLevels['PLO 5'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 6'] ? maxPloLevels['PLO 6'].code : '-'}</td>
                                        <td class="border border-slate-300 px-4 py-3 font-black text-rose-600 text-lg">${maxPloLevels['PLO 7'] ? maxPloLevels['PLO 7'].code : '-'}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        renderPLOSidebar();
        renderMainContent();
    </script>
</body>
</html>
